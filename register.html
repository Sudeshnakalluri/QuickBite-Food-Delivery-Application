{% extends "base.html" %}
{% block title %}Register - QuickBite{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4">
            <div class="text-center mb-4">
                <h2 style="color:var(--primary);">Create Account 🎉</h2>
                <p class="text-muted">Join QuickBite today</p>
            </div>
            <form method="POST">
                <div class="mb-3"><label class="form-label fw-bold">Full Name</label>
                    <input type="text" name="name" class="form-control" placeholder="John Doe" required></div>
                <div class="mb-3"><label class="form-label fw-bold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="your@email.com" required></div>
                <div class="mb-3"><label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Min 6 characters" required></div>
                <div class="mb-3"><label class="form-label fw-bold">Register As</label>
                    <select name="role" class="form-select">
                        <option value="customer">🛒 Customer</option>
                        <option value="restaurant">🍕 Restaurant Owner</option>
                        <option value="driver">🛵 Delivery Driver</option>
                    </select></div>
                <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account →</button>
            </form>
            <hr>
            <p class="text-center mb-0">Already have an account? <a href="{{ url_for('auth.login') }}" style="color:var(--primary);">Login</a></p>
        </div>
    </div>
</div>
{% endblock %}
