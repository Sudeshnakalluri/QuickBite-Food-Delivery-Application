{% extends "base.html" %}
{% block title %}Notifications{% endblock %}
{% block content %}
<h3 class="fw-bold mb-4">🔔 Notifications</h3>
{% if notifications %}
{% for n in notifications %}
<div class="card mb-2 {% if not n.is_read %}border-start border-warning border-3{% endif %}">
    <div class="card-body d-flex justify-content-between align-items-center py-3">
        <span>{{ n.message }}</span>
        <small class="text-muted ms-3 text-nowrap">{{ n.created_at.strftime('%d %b, %H:%M') }}</small>
    </div>
</div>
{% endfor %}
{% else %}
<div class="text-center py-5">
    <div style="font-size:80px;">🔔</div>
    <h4 class="text-muted mt-3">No notifications yet!</h4>
</div>
{% endif %}
{% endblock %}
